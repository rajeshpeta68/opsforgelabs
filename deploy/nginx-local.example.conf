# OpsForge Labs — serve Astro static build locally with nginx
#
# 1) Build the site (from repo root):
#    npm install && npm run build
#
# 2) Replace ROOT_DIST below with the absolute path to your `dist` folder.
#
# 3) Include this server {} block inside nginx.conf http {}, or put under conf.d/
#
# Windows path style works with forward slashes, e.g.
#   root   C:/Code_Base/2026/cursor/opsforgelabs/dist;

server {
    listen       8080;
    server_name  localhost;

    # <-- CHANGE THIS to your machine's path to `dist` after `npm run build`
    root   REPLACE_ME_FULL_PATH_TO_REPO/dist;
    index  index.html;

    # Astro emits folder indexes (e.g. /about/index.html). Serve those cleanly.
    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: cache static assets (adjust if you iterate on CSS/JS often)
    location ~* \.(css|js|woff2?|ico|svg)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}

# EC2 + nginx: serve the Astro static build
#
# On the server, app files live under e.g. /var/www/opsforgelabs/ (contents of `dist/`
# after `npm run build`, not the whole git repo).
#
# 1) Build on your laptop or in CI:  npm ci && npm run build
# 2) Upload dist/ to the server, e.g.
#      rsync -avz --delete dist/ ec2-user@YOUR_IP:/var/www/opsforgelabs/
# 3) sudo chown -R www-data:www-data /var/www/opsforgelabs
# 4) Copy this file to /etc/nginx/sites-available/opsforgelabs
#    sudo ln -sf /etc/nginx/sites-available/opsforgelabs /etc/nginx/sites-enabled/
# 5) sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (after DNS points to this EC2):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    root /var/www/opsforgelabs;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|woff2?|ico|svg|png|jpg|jpeg|webp|gif)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Optional: refuse hidden files
    location ~ /\. {
        deny all;
    }
}
